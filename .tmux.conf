# =============================================================
#  tmux.conf
# =============================================================

# -------------------------------------------------------------
# General
# -------------------------------------------------------------

# Prefix: C-a (easier than C-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded .tmux.conf"

# Remove ESC delay (critical for nvim)
set -sg escape-time 0

# Increase scrollback
set -g history-limit 10000

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Re-number windows when one is closed
set -g renumber-windows on

# Enable mouse (click panes, scroll, resize)
set -g mouse on

# Focus events (lets nvim detect focus changes)
set -g focus-events on

# -------------------------------------------------------------
# True color support
# -------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-256color:RGB"

# -------------------------------------------------------------
# Splits
# -------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"   # new windows inherit cwd

# -------------------------------------------------------------
# Pane navigation — vim-tmux-navigator compatible
# (C-h/j/k/l works seamlessly between tmux panes and nvim splits)
# -------------------------------------------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Also handle copy-mode
bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R

# Pane resizing
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# -------------------------------------------------------------
# Window navigation
# -------------------------------------------------------------
bind -n S-Left  previous-window
bind -n S-Right next-window

# -------------------------------------------------------------
# Vi copy mode
# -------------------------------------------------------------
setw -g mode-keys vi
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# -------------------------------------------------------------
# Command prompt
# -------------------------------------------------------------
bind \; command-prompt

# -------------------------------------------------------------
# Plugins — TPM
# -------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'

# -------------------------------------------------------------
# Dracula theme configuration
# -------------------------------------------------------------
set -g @dracula-plugins "git kubernetes-context cpu-usage ram-usage time"

# Powerline separators
set -g @dracula-show-powerline true
set -g @dracula-show-flags true

# Left icon: session name
set -g @dracula-show-left-icon session

# Status bar position
set -g status-position bottom

# Refresh rate (seconds)
set -g @dracula-refresh-rate 5

# High contrast pane borders
set -g @dracula-border-contrast true

# Hide widgets that return empty output
set -g @dracula-show-empty-plugins false

# git widget
set -g @dracula-git-disable-status false
set -g @dracula-git-show-current-symbol ✓
set -g @dracula-git-show-diff-symbol !
set -g @dracula-git-no-repo-message ""
set -g @dracula-git-no-untracked-files true

# kubernetes-context widget
set -g @dracula-kubernetes-hide-user true
set -g @dracula-kubernetes-eks-hide-arn true

# cpu-usage widget
set -g @dracula-cpu-usage-label " "

# ram-usage widget
set -g @dracula-ram-usage-label " "

# time widget
set -g @dracula-show-timezone false
set -g @dracula-military-time true
set -g @dracula-time-format "%a %b %d  %H:%M"

# -------------------------------------------------------------
# Initialize TPM (keep this line at the very bottom)
# -------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
