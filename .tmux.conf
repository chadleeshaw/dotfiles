# =============================================================
#  tmux.conf
# =============================================================

# -------------------------------------------------------------
# General
# -------------------------------------------------------------

# Prefix: C-a (easier than C-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded .tmux.conf"

# Remove ESC delay (critical for nvim)
set -sg escape-time 0

# Increase scrollback
set -g history-limit 10000

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Re-number windows when one is closed
set -g renumber-windows on

# Enable mouse (click panes, scroll, resize)
set -g mouse on

# Focus events (lets nvim detect focus changes)
set -g focus-events on

# -------------------------------------------------------------
# True color support (for tokyonight and other 24-bit themes)
# -------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-256color:RGB"

# -------------------------------------------------------------
# Splits
# -------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"   # new windows inherit cwd

# -------------------------------------------------------------
# Pane navigation — vim-tmux-navigator compatible
# (C-h/j/k/l works seamlessly between tmux panes and nvim splits)
# -------------------------------------------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Also handle copy-mode
bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R

# Pane resizing
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# -------------------------------------------------------------
# Window navigation
# -------------------------------------------------------------
bind -n S-Left  previous-window
bind -n S-Right next-window

# -------------------------------------------------------------
# Vi copy mode
# -------------------------------------------------------------
setw -g mode-keys vi
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# -------------------------------------------------------------
# Command prompt
# -------------------------------------------------------------
bind \; command-prompt

# -------------------------------------------------------------
# Status bar — tokyonight night palette
#   bg:      #1a1b26
#   surface: #24283b
#   subtle:  #414868
#   fg:      #c0caf5
#   blue:    #7aa2f7
#   cyan:    #7dcfff
#   green:   #9ece6a
#   yellow:  #e0af68
#   magenta: #bb9af7
# -------------------------------------------------------------
set -g status-position bottom
set -g status-style "bg=#24283b,fg=#c0caf5"
set -g status-left-length 40
set -g status-right-length 60

set -g status-left "\
#[fg=#1a1b26,bg=#7aa2f7,bold] #S \
#[fg=#7aa2f7,bg=#24283b]"

set -g status-right "\
#[fg=#414868,bg=#24283b]\
#[fg=#c0caf5,bg=#414868]  %b %d \
#[fg=#7aa2f7]  %H:%M \
#[fg=#1a1b26,bg=#7aa2f7,bold] #h "

set -g window-status-format "\
#[fg=#414868,bg=#24283b]\
#[fg=#a9b1d6,bg=#414868] #I  #W \
#[fg=#414868,bg=#24283b]"

set -g window-status-current-format "\
#[fg=#24283b,bg=#7aa2f7]\
#[fg=#1a1b26,bg=#7aa2f7,bold] #I  #W \
#[fg=#7aa2f7,bg=#24283b]"

set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

# Message / command prompt
set -g message-style "bg=#414868,fg=#e0af68,bold"

# Clock
set -g clock-mode-style 12
set -g clock-mode-colour "#7aa2f7"
